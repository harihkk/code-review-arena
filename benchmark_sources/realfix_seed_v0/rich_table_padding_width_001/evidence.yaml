category: correctness
evidence_summary: >
  Issue #3871 reports uneven padding between table cells. PR #3935 ("fix for padding
  width", merged) rewrites Table._get_padding_width to handle collapsed padding and
  to drop the outer padding of the first and last columns so spacing is consistent.
why_buggy_behavior_is_wrong: >
  A rendered table must have consistent padding between cells. In the buggy tree
  _get_padding_width only reduced the left pad for collapsed padding on inner columns
  and never accounted for the table's edge-padding setting, so edge and inner cells
  contributed different padding widths and the table rendered with uneven spacing.
fixed_tests_that_exercise_it: >
  tests/test_table.py::test_padding_width (the regression test added by PR #3935,
  citing issue #3871) renders a table and asserts even padding between cells. It fails
  on the buggy tree and passes on the fixed tree.
why_ground_truth_is_supported: >
  The declared buggy logic (rich/table.py lines 699-705 in the after/ tree) is exactly
  the _get_padding_width method PR #3935 rewrites, and issue #3871 establishes the
  uneven-padding defect the regression test pins.
admission_status: accepted
