category: correctness
evidence_summary: >
  PR #1514 ("Fix FrozenInstanceError displaying empty message in tracebacks")
  reports that raising FrozenInstanceError produced an exception with no message
  because FrozenError set msg/args at class scope instead of constructing the
  exception. The fix gives FrozenError an __init__ that calls super().__init__(msg).
why_buggy_behavior_is_wrong: >
  A raised FrozenInstanceError must carry its "can't set attribute" message through
  the normal exception machinery (e.value.args[0] and the rendered traceback). In the
  buggy tree the message lives only as class attributes, so the instance's args are
  not populated by an initializer and the message is lost in tracebacks.
fixed_tests_that_exercise_it: >
  tests/test_functional.py::TestFunctional::test_frozen_instance asserts that setting
  or deleting an attribute on a frozen instance raises FrozenInstanceError matching
  "can't set attribute" and that e.value.msg == e.value.args[0] == "can't set
  attribute". It fails on the buggy tree and passes on the fixed tree.
why_ground_truth_is_supported: >
  The declared buggy logic (src/attr/exceptions.py lines 19-20 in the after/ tree) is
  exactly the class-scope msg and ClassVar args that PR #1514 replaces with a proper
  initializer, and the PR establishes the empty-message defect the regression test pins.
admission_status: accepted
