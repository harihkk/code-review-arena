category: correctness
evidence_summary: >
  Issue #3071 ("default=True on feature flags is order-sensitive") reports that two
  boolean flags bound to the same destination produced different results depending
  on the order the options were declared. PR #3079 fixes it by deferring the
  UNSET-to-None normalization until all parameters are processed.
why_buggy_behavior_is_wrong: >
  The default that a user observes must depend on which option carries an explicit
  default, not on Click's internal parameter-processing order. In the buggy tree
  Parameter.process_value normalizes UNSET to None immediately and skips a name
  already present in ctx.params, so a sibling option processed first can lock in the
  wrong value for the shared destination.
fixed_tests_that_exercise_it: >
  tests/test_defaults.py::test_shared_param_prefers_first_default points two flags
  at one parameter declaration where only one flag has a default and asserts the
  result is independent of declaration order. It fails on the buggy tree and passes
  on the fixed tree.
why_ground_truth_is_supported: >
  The declared buggy logic (src/click/core.py lines 2541-2551 in the after/ tree) is
  exactly the normalization and skip condition that PR #3079 rewrites, and the issue
  establishes the order-sensitive precedence defect that the regression test pins.
admission_status: accepted
