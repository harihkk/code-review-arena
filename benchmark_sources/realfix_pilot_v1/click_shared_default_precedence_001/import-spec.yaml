schema_version: "1"
pack:
  version: "1"
  name: realfix_pilot_v1
case:
  id: click_shared_default_precedence_001
  title: Feature-flag default is order-sensitive across a shared destination
  category: correctness
  severity: medium
  stack: [python]
  description: >
    Two options that target the same destination resolved their default in
    parameter-processing order. An option carrying an explicit default could be
    overwritten by a sibling option without one, so the observed default depended
    on declaration order rather than on which option actually set a default.
source_paths: [src/click]
tests_root: tests
ground_truth:
  bugs:
    - id: bug-1
      summary: >
        Each parameter normalized an UNSET default to None as it was processed and
        skipped any name already present in ctx.params, so for two options sharing a
        destination the first-processed value won regardless of which option carried
        the explicit default. Normalization must be deferred until all parameters are
        processed so the first non-UNSET default is preserved.
      files:
        - path: src/click/core.py
          line_ranges:
            - start: 2541
              end: 2551
      concepts: ["order-sensitive default", "shared destination"]
      must_mention: ["order-sensitive"]
      acceptable_fix_keywords: ["deferred normalization", "stable default"]
execution:
  run_tests: true
  test_command: "pytest tests/test_defaults.py -q"
  timeout_seconds: 120
  docker_image: arena-realfix-pilot:1
validation:
  patch_required: true
  tests_required: true
