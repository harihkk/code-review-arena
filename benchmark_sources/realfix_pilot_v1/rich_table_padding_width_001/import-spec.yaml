schema_version: "1"
pack:
  version: "1"
  name: realfix_pilot_v1
case:
  id: rich_table_padding_width_001
  title: Table cell padding is uneven at column edges
  category: correctness
  severity: low
  stack: [python]
  description: >
    Table computed per-column padding width without correctly accounting for
    collapsed padding and for cells at the first and last columns, so rendered
    tables had uneven padding between cells instead of consistent spacing.
source_paths: [rich]
tests_root: tests
ground_truth:
  bugs:
    - id: bug-1
      summary: >
        _get_padding_width only adjusted the left pad for collapsed padding on inner
        columns and ignored the table's edge-padding setting, so the extra width
        contributed by padding differed between edge and inner cells and produced
        uneven column spacing. Edge columns must drop their outer padding and
        collapsed padding must be applied consistently.
      files:
        - path: rich/table.py
          line_ranges:
            - start: 699
              end: 705
      concepts: ["cell padding width", "edge padding"]
      must_mention: ["edge padding"]
      acceptable_fix_keywords: ["even padding", "edge padding"]
execution:
  run_tests: true
  test_command: "pytest tests/test_table.py tests/test_columns.py -q"
  timeout_seconds: 120
  docker_image: arena-realfix-pilot:1
validation:
  patch_required: true
  tests_required: true
