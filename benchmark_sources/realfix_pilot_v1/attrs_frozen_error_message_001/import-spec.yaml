schema_version: "1"
pack:
  version: "1"
  name: realfix_pilot_v1
case:
  id: attrs_frozen_error_message_001
  title: FrozenInstanceError loses its message in tracebacks
  category: correctness
  severity: low
  stack: [python]
  description: >
    FrozenError declared its message and args as class attributes instead of
    initializing the exception normally, so a raised FrozenInstanceError carried
    an empty message in tracebacks and did not propagate "can't set attribute"
    through the standard exception machinery.
source_paths: [src/attr]
tests_root: tests
ground_truth:
  bugs:
    - id: bug-1
      summary: >
        FrozenError set msg and a ClassVar args list at class scope rather than
        calling the base Exception initializer, so the message was not stored on the
        instance and the error rendered with no message. The exception must be
        constructed by passing the message to its superclass initializer.
      files:
        - path: src/attr/exceptions.py
          line_ranges:
            - start: 19
              end: 20
      concepts: ["exception initialization", "message propagation"]
      must_mention: ["exception constructor"]
      acceptable_fix_keywords: ["call super", "exception constructor"]
execution:
  run_tests: true
  test_command: "pytest tests/test_functional.py::TestFunctional::test_frozen_instance -q"
  timeout_seconds: 120
  docker_image: arena-realfix-pilot:1
validation:
  patch_required: true
  tests_required: true
