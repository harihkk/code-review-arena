id: page_count_ceil_001
title: Page count uses floor division and drops the final partial page
category: correctness
severity: medium
stack: [python, api, pagination]
description: >
  A pull request simplifies the page-count helper to a plain integer division. The
  final partial page is no longer counted, so clients miss the last batch of items.
input:
  diff: pr.diff
  before_dir: before
  after_dir: after
  tests_dir: tests
ground_truth:
  bugs:
    - summary: >
        The helper divides the item total by the page size with floor division, so any
        remainder that needs one more page is dropped.
      files:
        - path: app/paging.py
          line_ranges: [{start: 3, end: 3}]
      concepts: [ceiling division, integer division, off by one]
      must_mention: [ceiling, round up]
      acceptable_fix_keywords: [ceiling, round up, remainder]
scoring:
  weights: {concept_match: 35, file_match: 20, line_overlap: 15, severity_match: 10, fix_quality: 15, no_false_positives: 5}
  false_positive_penalty: 5
  invalid_json_penalty: 20
execution:
  run_tests: true
  test_command: "pytest -q tests"
  timeout_seconds: 30
validation:
  patch_required: true
  tests_required: true
metrics: {beta: 1.0}
