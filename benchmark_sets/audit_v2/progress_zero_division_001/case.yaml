id: progress_zero_division_001
title: Completion percentage drops the empty-workload guard and divides by zero
category: correctness
severity: high
stack: [python, reliability]
description: >
  A pull request simplifies a completion-percentage helper and removes the branch that
  handled an empty workload, so the function now divides by zero on an empty input.
input:
  diff: pr.diff
  before_dir: before
  after_dir: after
  tests_dir: tests
ground_truth:
  bugs:
    - summary: >
        The early return for an empty workload was removed, so dividing by the total
        raises on an empty input instead of returning a defined percentage.
      files:
        - path: app/progress.py
          line_ranges: [{start: 3, end: 3}]
      concepts: [division by zero, empty input, missing guard]
      must_mention: [zero, division]
      acceptable_fix_keywords: [guard, check, denominator]
scoring:
  weights: {concept_match: 35, file_match: 20, line_overlap: 15, severity_match: 10, fix_quality: 15, no_false_positives: 5}
  false_positive_penalty: 5
  invalid_json_penalty: 20
execution:
  run_tests: true
  test_command: "pytest -q tests"
  timeout_seconds: 30
validation:
  patch_required: true
  tests_required: true
metrics: {beta: 1.0}
