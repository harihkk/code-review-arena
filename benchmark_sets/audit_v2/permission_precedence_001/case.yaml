id: permission_precedence_001
title: Publish permission check drops grouping and lets a frozen resource through
category: security
severity: high
stack: [python, authorization]
description: >
  A pull request rewrites a publish permission check. Without grouping, the boolean
  expression binds in the wrong order and an owner can publish a frozen resource.
input:
  diff: pr.diff
  before_dir: before
  after_dir: after
  tests_dir: tests
ground_truth:
  bugs:
    - summary: >
        The publish check relies on default operator binding instead of grouping the
        role test, so the frozen guard no longer applies to an owner.
      files:
        - path: app/permissions.py
          line_ranges: [{start: 3, end: 3}]
      concepts: [operator precedence, boolean logic, authorization bypass]
      must_mention: [precedence, grouping]
      acceptable_fix_keywords: [parentheses, group, precedence]
scoring:
  weights: {concept_match: 35, file_match: 20, line_overlap: 15, severity_match: 10, fix_quality: 15, no_false_positives: 5}
  false_positive_penalty: 5
  invalid_json_penalty: 20
execution:
  run_tests: true
  test_command: "pytest -q tests"
  timeout_seconds: 30
validation:
  patch_required: true
  tests_required: true
metrics: {beta: 1.0}
