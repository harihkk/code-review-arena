id: async_balance_race_001
title: Async balance updates lose concurrent writes
category: correctness
severity: high
stack: [python, asyncio]
description: >
  A pull request removes the asyncio lock around balance updates, allowing concurrent
  read-modify-write operations to drop increments.
input:
  diff: pr.diff
  before_dir: before
  after_dir: after
  tests_dir: tests
ground_truth:
  primary_bug:
    summary: Concurrent balance mutations are non-atomic and can lose writes.
    files:
      - path: app/balance.py
        line_ranges: [{start: 8, end: 11}]
    concepts: [race condition, concurrency, lost update, atomicity]
    must_mention: [concurrent, lock, atomic]
    acceptable_fix_keywords: [asyncio.Lock, lock, atomic, version]
scoring:
  weights: {concept_match: 35, file_match: 20, line_overlap: 15, severity_match: 10, fix_quality: 15, no_false_positives: 5}
  false_positive_penalty: 5
  invalid_json_penalty: 20
execution:
  run_tests: true
  test_command: "pytest -q tests"
  timeout_seconds: 30
validation:
  patch_required: true
  tests_required: true
  structural_validators: [async_update_atomicity_guard]
metrics: {beta: 1.0}
