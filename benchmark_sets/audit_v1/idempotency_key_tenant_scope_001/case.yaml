id: idempotency_key_tenant_scope_001
title: Idempotency keys collide across tenants
category: reliability
severity: high
stack: [python, api, multi-tenant]
description: >
  A pull request stores idempotency responses under the raw key only, so two tenants
  reusing the same idempotency key can observe each other's cached responses.
input:
  diff: pr.diff
  before_dir: before
  after_dir: after
  tests_dir: tests
ground_truth:
  primary_bug:
    summary: Idempotency storage ignores tenant scope when looking up cached responses.
    files:
      - path: app/idempotency.py
        line_ranges: [{start: 5, end: 9}]
    concepts: [idempotency, tenant isolation, cache collision, multi-tenant]
    must_mention: [tenant, idempotency, scope]
    acceptable_fix_keywords: [tenant_id, organization_id, account_id, scoped]
scoring:
  weights: {concept_match: 35, file_match: 20, line_overlap: 15, severity_match: 10, fix_quality: 15, no_false_positives: 5}
  false_positive_penalty: 5
  invalid_json_penalty: 20
execution:
  run_tests: true
  test_command: "pytest -q tests"
  timeout_seconds: 30
validation:
  patch_required: true
  tests_required: true
  structural_validators: [tenant_scoped_idempotency_key]
metrics: {beta: 1.0}
