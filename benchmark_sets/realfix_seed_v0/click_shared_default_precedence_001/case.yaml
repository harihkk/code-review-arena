    id: bug-1
    must_mention:
    - order-sensitive
    summary: 'Each parameter normalized an UNSET default to None as it was processed
      and skipped any name already present in ctx.params, so for two options sharing
      a destination the first-processed value won regardless of which option carried
      the explicit default. Normalization must be deferred until all parameters are
      processed so the first non-UNSET default is preserved.

      '
