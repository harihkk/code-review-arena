    concepts:
    - exception initialization
    - message propagation
    files:
    - line_ranges:
      - end: 20
        start: 19
      path: src/attr/exceptions.py
    id: bug-1
    must_mention:
    - exception constructor
    summary: 'FrozenError set msg and a ClassVar args list at class scope rather than
      calling the base Exception initializer, so the message was not stored on the
      instance and the error rendered with no message. The exception must be constructed
      by passing the message to its superclass initializer.

      '
