id: fastapi_auth_bypass_001
title: FastAPI admin authorization bypass
category: security
severity: high
stack: [python, fastapi, auth]
description: >
  A pull request changes an admin endpoint to require an authenticated user but removes
  enforcement of administrator privileges.
input:
  diff: pr.diff
  before_dir: before
  after_dir: after
  tests_dir: tests
ground_truth:
  primary_bug:
    summary: Missing authorization check on admin endpoint.
    files:
      - path: app/routes/admin.py
        line_ranges: [{start: 10, end: 14}]
    concepts: [authorization, role-based access control, privilege escalation]
    must_mention: [admin, role, authorization]
    acceptable_fix_keywords: [require_admin, is_admin, RBAC]
scoring:
  weights: {concept_match: 35, file_match: 20, line_overlap: 15, severity_match: 10, fix_quality: 15, no_false_positives: 5}
  false_positive_penalty: 5
  invalid_json_penalty: 20
execution:
  run_tests: true
  test_command: "pytest -q tests"
  timeout_seconds: 30
  docker_image: null
validation:
  patch_required: true
  tests_required: true
  structural_validators: [fastapi_requires_admin_authorization]
metrics: {beta: 1.0}
