id: kafka_idempotency_bug_001
title: Kafka duplicate payment application
category: distributed-systems
severity: high
stack: [python, kafka, payments]
description: >
  The consumer removes its processed event tracking and credits duplicate delivered events.
input:
  diff: pr.diff
  before_dir: before
  after_dir: after
  tests_dir: tests
ground_truth:
  primary_bug:
    summary: Payment updates are no longer idempotent for duplicate Kafka events.
    files:
      - path: consumer/payments.py
        line_ranges: [{start: 4, end: 6}]
    concepts: [idempotency, duplicate event, at-least-once delivery]
    must_mention: [event_id, duplicate, credit]
    acceptable_fix_keywords: [processed_event_ids, event_id, idempotency]
scoring:
  weights: {concept_match: 35, file_match: 20, line_overlap: 15, severity_match: 10, fix_quality: 15, no_false_positives: 5}
  false_positive_penalty: 5
  invalid_json_penalty: 20
execution:
  run_tests: true
  test_command: "pytest -q tests"
  timeout_seconds: 30
  docker_image: null
validation:
  patch_required: true
  tests_required: true
  structural_validators: [kafka_idempotency_guard]
metrics: {beta: 1.0}
