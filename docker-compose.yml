# CodeReview Arena (code-review-arena)
services:
  api:
    build: .
    image: code-review-arena-api:local
    command: arena serve --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      ARENA_DB_PATH: /app/data/arena.db
      ARENA_RUNS_DIR: /app/runs
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build: ./dashboard
    image: code-review-arena-dashboard:local
    ports:
      - "3000:3000"
    environment:
      ARENA_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
