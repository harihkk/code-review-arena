name: Arena Deterministic Benchmark

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "arena/**"
      - "benchmark_sets/**"
      - "tests/**"
      - ".github/workflows/arena-benchmark.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: arena validate benchmark_sets/v1
      - run: arena run benchmark_sets/v1 --reviewer mock:perfect_patch --mode full --allow-local-execution
      - run: arena leaderboard runs/ --metric validated_f_beta --beta 1.0
      - uses: actions/upload-artifact@v4
        with:
          name: arena-deterministic-runs
          path: runs/
