name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check arena tests
      - run: ruff format --check arena tests
      - run: mypy arena
      - run: pytest
      - run: arena validate benchmark_sets/v1
      - run: arena run benchmark_sets/v1 --reviewer mock:perfect
      - run: arena run benchmark_sets/v1 --reviewer mock:perfect_patch --mode full --allow-local-execution
