name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      # Mirrors the Makefile targets a contributor runs locally.
      - name: Lint
        run: |
          ruff check arena tests
          ruff format --check arena tests
      - name: Typecheck
        run: mypy arena
      - name: Tests
        run: pytest
      - name: Validate benchmark packs
        run: |
          arena validate benchmark_sets/v1
          arena validate benchmark_sets/audit_v1
      # Deterministic, execution-backed proof that the full pipeline works.
      - name: Reference-patch full run (audit_v1)
        run: arena run benchmark_sets/audit_v1 --reviewer reference-patch --mode full --allow-local-execution
      - name: Leaderboard
        run: arena leaderboard runs/ --metric validated_f_beta --beta 1.0
      - uses: actions/upload-artifact@v4
        with:
          name: arena-runs
          path: runs/

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
