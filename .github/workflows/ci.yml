name: CI

on:
  push:
  pull_request:

# Least privilege: CI only reads the repo. Grant more per-job if ever needed.
permissions:
  contents: read

jobs:
  backend:
    name: Backend gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      # Mirrors the Makefile targets a contributor runs locally.
      - name: Lint
        run: |
          ruff check arena tests
          ruff format --check arena tests
      - name: Typecheck
        run: mypy arena
      # The suite includes hostile-patch rejection, blind-payload regression,
      # context-truncation, multi-bug scoring, validator negative fixtures,
      # determinism, and the reviewer-contract checks.
      - name: Tests
        run: pytest
      - name: Validate benchmark packs
        run: |
          arena validate benchmark_sets/v1
          arena validate benchmark_sets/audit_v1
          arena validate benchmark_sets/audit_v2
      - name: Pack checksums
        run: |
          arena pack-hash benchmark_sets/v1
          arena pack-hash benchmark_sets/audit_v1
          arena pack-hash benchmark_sets/audit_v2
      - name: Contamination scan
        run: |
          # All shipped packs are authored leak-free; fail the build on any regression.
          arena lint-cases benchmark_sets/v1 --strict
          arena lint-cases benchmark_sets/audit_v1 --strict
          arena lint-cases benchmark_sets/audit_v2 --strict
      - name: Reviewer contract smoke test
        run: |
          arena schema > /tmp/review-schema.json
          arena verify-reviewer benchmark_sets/audit_v1 --command "python tests/fixtures/fake_reviewers/valid_reviewer.py --case {case_json}"
      # Deterministic, execution-backed proof that the full pipeline works.
      - name: Reference-patch full run (audit_v1)
        run: arena run benchmark_sets/audit_v1 --reviewer reference-patch --mode full --allow-local-execution
      - name: Reference-patch full run (audit_v2)
        run: arena run benchmark_sets/audit_v2 --reviewer reference-patch --mode full --allow-local-execution
      # Every shipped pack must stay fully certified (baseline fails, reference
      # passes, mutants killed); fail the build if any case regresses.
      - name: Certify shipped packs
        run: |
          arena certify-pack benchmark_sets/v1 --allow-local-execution --strict certified
          arena certify-pack benchmark_sets/audit_v1 --allow-local-execution --strict certified
          arena certify-pack benchmark_sets/audit_v2 --allow-local-execution --strict certified
      # Cheat-resistance: the keyword-stuffing control must detect everything
      # and validate nothing.
      - name: Keyword-gamer control run (audit_v1)
        run: arena run benchmark_sets/audit_v1 --reviewer control:keyword_gamer --mode full --allow-local-execution
      # The generic adversarial baseline reproduces the gap on the second pack.
      - name: Shallow-patch adversarial run (audit_v2)
        run: arena run benchmark_sets/audit_v2 --reviewer shallow-patch --mode full --allow-local-execution
      - name: Leaderboard
        run: arena leaderboard runs/ --metric validated_case_rate --beta 1.0 --include-unverified
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: arena-runs
          path: runs/

  docker:
    name: Docker backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      # The executor never pulls a missing image, so every image a test uses
      # must be present in the image store first. buildx keeps the base layer in
      # its own cache, so pull python:3.12-slim explicitly (the digest test also
      # needs a registry image: locally-built images carry no RepoDigests).
      - name: Pull base image into the image store
        run: docker pull python:3.12-slim
      # Build the sandbox image the packs run their tests in, then exercise the
      # real Docker path (locked-down container, workspace-module collection,
      # read-only test mount, recorded image digest). Skips without the env var.
      - name: Build benchmark sandbox image
        run: bash scripts/build_bench_image.sh
      - name: Real Docker execution tests
        env:
          ARENA_DOCKER_TESTS: "1"
        run: pytest tests/test_docker_execution.py -q

  package:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      # Build the wheel and install it into a clean venv (not editable), so a
      # packaging gap (a module or package-data file missing from the wheel) is
      # caught here instead of by a user on a fresh install.
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build --wheel --outdir dist
      - name: Install wheel in a clean environment and run the CLI
        run: |
          python -m venv /tmp/fresh
          /tmp/fresh/bin/pip install dist/*.whl
          /tmp/fresh/bin/arena --help
          /tmp/fresh/bin/arena schema > /dev/null
          /tmp/fresh/bin/python -c "import importlib.resources as r; assert (r.files('arena') / 'storage' / 'schema.sql').is_file()"

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  windows-safety:
    name: Windows fail-closed
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      # Every pack-controlled command path must fail closed on Windows (no
      # process-tree kill or byte-bounded output here): run_supervised, static
      # analysis via run_command, and the custom-command reviewer.
      - name: Command execution fails closed
        run: pytest -k fails_closed -q
      # Non-execution commands (validation, schema, pack hashing, listing) stay
      # usable on Windows.
      - name: Non-execution commands still work
        run: |
          arena validate benchmark_sets/v1
          arena schema > schema.json
          arena pack-hash benchmark_sets/v1
          arena list-cases
